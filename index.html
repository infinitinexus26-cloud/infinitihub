<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infiniti Nexus | Criação de Sites Profissionais</title>
    <meta name="description" content="Crio sites bonitos, rápidos e otimizados para pequenas empresas.">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
            line-height: 1.6;
        }

        /* HEADER */
        header {
            background: #0a0a0a;
            border-bottom: 1px solid #1f1f1f;
            padding: 15px 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-container img {
            height: 42px;
            width: auto;
        }

        .logo-container span {
            font-size: 24px;
            font-weight: 700;
            color: #00ff9d;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: #ccc;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #00ff9d;
        }

        /* HERO */
        .hero {
            height: 100vh;
            min-height: 650px;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1555066932-4365d14bab9c?ixlib=rb-4.0.3&auto=format&fit=crop&q=80') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero-content {
            max-width: 900px;
        }

        .hero h1 {
            font-size: 3.2rem;
            margin-bottom: 20px;
            color: white;
        }

        .hero p {
            font-size: 1.25rem;
            color: #ccc;
            margin-bottom: 40px;
        }

        .btn {
            background: #00ff9d;
            color: #000;
            padding: 16px 45px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #00cc7a;
            transform: scale(1.05);
        }

        /* Seções */
        section {
            padding: 100px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        h2 {
            font-size: 2.6rem;
            text-align: center;
            margin-bottom: 60px;
            color: #00ff9d;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .nav-links {
                display: none; /* Esconde os links no celular (pode adicionar menu hambúrguer depois) */
            }

            .hero h1 {
                font-size: 2.4rem;
            }

            .hero p {
                font-size: 1.1rem;
            }

            .logo-container img {
                height: 35px;
            }

            .logo-container span {
                font-size: 20px;
            }
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 2.1rem;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <nav>
            <div class="logo-container">
                <img src="imagens/logo.png" alt="Infiniti Nexus Logo">
                <span>Infiniti Nexus</span>
            </div>
            
            <div class="nav-links">
                <a href="#sobre">Sobre</a>
                <a href="#servicos">Serviços</a>
                <a href="#pacotes">Pacotes</a>
                <a href="#portfolio">Portfólio</a>
                <a href="#contato">Contato</a>
            </div>
        </nav>
    </header>

    <!-- HERO -->
    <section class="hero">
        <div class="hero-content">
            <h1>Sites profissionais que fazem<br>seu negócio crescer</h1>
            <p>Crio sites bonitos, rápidos e otimizados para pequenas empresas.<br>Design moderno + integração direta com WhatsApp.</p>
            <button class="btn" onclick="document.getElementById('contato').scrollIntoView({behavior: 'smooth'})">
                Quero um site para o meu negócio
            </button>
        </div>
    </section>

    <!-- Você pode adicionar as outras seções (Sobre, Serviços, etc.) aqui -->

    <footer style="text-align: center; padding: 40px 20px; background: #000; color: #666;">
        <p>&copy; 2026 Infiniti Nexus - Criação de Sites</p>
    </footer>

</body>
</html>
